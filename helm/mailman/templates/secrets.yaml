{{/*
Database credentials secret
*/}}
{{- if and .Values.secrets.database.create (not .Values.secrets.database.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.database.name }}
  labels:
    {{- include "mailman.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.secrets.database.keys.rootPassword }}: {{ .Values.mysql.auth.rootPassword | b64enc | quote }}
  {{ .Values.secrets.database.keys.userPassword }}: {{ .Values.mysql.auth.password | b64enc | quote }}
  username: {{ .Values.mysql.auth.username | b64enc | quote }}
{{- end }}

{{/*
OAuth2 credentials secret
*/}}
{{- if and .Values.secrets.oauth2.create (not .Values.secrets.oauth2.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.oauth2.name }}
  labels:
    {{- include "mailman.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.secrets.oauth2.keys.gmailClientId }}: {{ .Values.secrets.oauth2.gmailClientId | default "" | b64enc | quote }}
  {{ .Values.secrets.oauth2.keys.gmailClientSecret }}: {{ .Values.secrets.oauth2.gmailClientSecret | default "" | b64enc | quote }}
  {{ .Values.secrets.oauth2.keys.outlookClientId }}: {{ .Values.secrets.oauth2.outlookClientId | default "" | b64enc | quote }}
  {{ .Values.secrets.oauth2.keys.outlookClientSecret }}: {{ .Values.secrets.oauth2.outlookClientSecret | default "" | b64enc | quote }}
{{- end }}

{{/*
Application secrets
*/}}
{{- if and .Values.secrets.app.create (not .Values.secrets.app.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.app.name }}
  labels:
    {{- include "mailman.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.secrets.app.keys.jwtSecret }}: {{ .Values.secrets.app.jwtSecret | default (randAlphaNum 32) | b64enc | quote }}
  {{ .Values.secrets.app.keys.encryptionKey }}: {{ .Values.secrets.app.encryptionKey | default (randAlphaNum 32) | b64enc | quote }}
{{- end }}