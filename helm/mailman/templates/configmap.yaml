{{- if .Values.configMaps.app.create }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.configMaps.app.name }}
  labels:
    {{- include "mailman.labels" . | nindent 4 }}
data:
  {{- range $key, $val := .Values.configMaps.app.data }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
{{- end }}