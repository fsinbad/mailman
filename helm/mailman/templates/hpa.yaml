{{- if .Values.mailman.backend.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "mailman.fullname" . }}-backend
  labels:
    {{- include "mailman.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "mailman.fullname" . }}-backend
  minReplicas: {{ .Values.mailman.backend.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.mailman.backend.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.mailman.backend.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.mailman.backend.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.mailman.backend.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.mailman.backend.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}

