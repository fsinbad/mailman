apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mailman.fullname" . }}-backend
  labels:
    {{- include "mailman.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  {{- if not .Values.mailman.backend.autoscaling.enabled }}
  replicas: {{ .Values.mailman.backend.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "mailman.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
        {{- with .Values.mailman.backend.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "mailman.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "mailman.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.mailman.backend.podSecurityContext | nindent 8 }}
      containers:
        - name: backend
          securityContext:
            {{- toYaml .Values.mailman.backend.securityContext | nindent 12 }}
          image: "{{ .Values.mailman.backend.image.registry }}/{{ .Values.mailman.backend.image.repository }}:{{ .Values.mailman.backend.image.tag }}"
          imagePullPolicy: {{ .Values.mailman.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            {{- toYaml .Values.mailman.backend.livenessProbe | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            {{- toYaml .Values.mailman.backend.readinessProbe | nindent 12 }}
          env:
            - name: DB_HOST
              value: {{ include "mailman.mysql.fullname" . }}
            - name: DB_PORT
              value: "3306"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "mailman.database.secretName" . }}
                  key: {{ .Values.secrets.database.keys.username }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mailman.database.secretName" . }}
                  key: {{ .Values.secrets.database.keys.userPassword }}
            - name: DB_NAME
              value: {{ .Values.mysql.auth.database }}
            {{- if .Values.secrets.oauth2.create }}
            - name: GMAIL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.oauth2.name }}
                  key: {{ .Values.secrets.oauth2.keys.gmailClientId }}
            - name: GMAIL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.oauth2.name }}
                  key: {{ .Values.secrets.oauth2.keys.gmailClientSecret }}
            - name: OUTLOOK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.oauth2.name }}
                  key: {{ .Values.secrets.oauth2.keys.outlookClientId }}
            - name: OUTLOOK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.oauth2.name }}
                  key: {{ .Values.secrets.oauth2.keys.outlookClientSecret }}
            {{- end }}
            {{- if .Values.configMaps.app.create }}
            - name: GMAIL_REDIRECT_URI
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.configMaps.app.name }}
                  key: GMAIL_REDIRECT_URI
            - name: OUTLOOK_REDIRECT_URI
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.configMaps.app.name }}
                  key: OUTLOOK_REDIRECT_URI
            - name: OPENAI_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.configMaps.app.name }}
                  key: OPENAI_BASE_URL
            - name: OPENAI_MODEL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.configMaps.app.name }}
                  key: OPENAI_MODEL
            {{- end }}
            {{- range $key, $val := .Values.mailman.backend.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.mailman.backend.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.persistence.logs.enabled }}
            - name: logs
              mountPath: /app/logs
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.persistence.logs.enabled }}
        - name: logs
          persistentVolumeClaim:
            claimName: {{ include "mailman.fullname" . }}-logs
        {{- end }}
      {{- with .Values.mailman.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mailman.backend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mailman.backend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}