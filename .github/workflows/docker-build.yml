name: Build and Push Docker Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Multi-architecture build (AMD64 + ARM64)
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component: [backend, frontend, all]
        include:
          - component: backend
            context: ./backend
            file: ./backend/Dockerfile
          - component: frontend
            context: ./frontend
            file: ./frontend/Dockerfile.nginx
          - component: all
            context: .
            file: ./Dockerfile.all
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-architecture image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Create release (only for tags)
  create-release:
    runs-on: ubuntu-latest
    needs: build-images
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## 🐳 Multi-Architecture Docker Images

            This release includes support for multiple architectures:

            ✅ **linux/amd64** - Intel/AMD 64-bit (Desktops, Servers)
            ✅ **linux/arm64** - ARM 64-bit (Apple Silicon, ARM Servers)

            ## 🚀 Quick Start

            ### All-in-One Image (Recommended)
            ```bash
            docker run -d \
              --name mailman \
              -p 8080:80 \
              -v mailman_data:/app/data \
              --restart unless-stopped \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-all-in-one:${{ github.ref_name }}
            ```

            ### Separate Frontend and Backend
            ```bash
            # Backend
            docker run -d \
              --name mailman-backend \
              -p 8080:8080 \
              -v mailman_data:/app/data \
              --restart unless-stopped \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.ref_name }}

            # Frontend
            docker run -d \
              --name mailman-frontend \
              -p 80:80 \
              --restart unless-stopped \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.ref_name }}
            ```

            ## 🏗️ Platform-Specific Deployments

            ### For Apple Silicon (M1/M2/M3) Mac
            ```bash
            docker run -d \
              --name mailman \
              -p 8080:80 \
              -v mailman_data:/app/data \
              --platform linux/arm64 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-all-in-one:${{ github.ref_name }}
            ```

            ## 🌐 Access the Application

            After deployment:
            - **Frontend**: http://localhost:8080
            - **Default Login**: admin / admin123
            - **API**: http://localhost:8080/api/health

            ## 📦 Architecture Support

            This release automatically supports both AMD64 and ARM64 architectures. Docker will automatically select the appropriate image for your platform.
          draft: false
          prerelease: false