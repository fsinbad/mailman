global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "mailman_backend"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["backend:8080"]
    
  - job_name: "mailman_frontend"
    metrics_path: "/api/metrics"
    static_configs:
      - targets: ["frontend:3000"]

  - job_name: "node_exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]